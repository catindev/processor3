apiVersion: v1
kind: Service
metadata:
  name: {{ include "beneficiary-processor-v3.fullname" . }}
  labels:
    {{- include "beneficiary-processor-v3.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "beneficiary-processor-v3.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
